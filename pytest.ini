[pytest]
markers =
    integration: tests that validate real component interactions
    ollama: tests that require a running Ollama instance
    web: tests that require outbound internet access
    windows_only: tests that require Windows-specific behavior
    e2e: tests that validate full application entrypoint flows
    gui: tests that exercise GUI entrypoints
    cli: tests that exercise CLI entrypoints
    full_flow: tests that validate an end-to-end happy path across major subsystems
